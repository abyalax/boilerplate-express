services:
  postgres:
    image: postgres:15
    restart: no
    environment:
      POSTGRES_USER: boilerplate_express
      POSTGRES_PASSWORD: boilerplate_express
      POSTGRES_DB: db_boilerplate_express
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
